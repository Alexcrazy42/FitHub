version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio-local
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web UI
    environment:
        MINIO_ROOT_USER: minio     # ← Измените здесь
        MINIO_ROOT_PASSWORD: minio123  # ← И здесь
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - file-network

  filestorageapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5206:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_ENVIRONMENT=Development
      - AWS__AccessKey=minio
      - AWS__SecretKey=minio123
      - AWS__Region=us-east-1
      - AWS__ServiceURL=http://minio:9000
      - AWS__BucketName=myfiles
    depends_on:
      - minio
    networks:
      - file-network

volumes:
  minio_data:

networks:
  file-network:
    driver: bridge