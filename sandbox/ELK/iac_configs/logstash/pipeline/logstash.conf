input {
  tcp {
    port => 5000
    codec => json
    type => "dotnet-log"
  }
  udp {
    port => 5000
    codec => json
    type => "dotnet-log"
  }
}

filter {
  # Если в логе есть timestamp — используем его как @timestamp
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}