version: '3.8'

services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: always
    ports:
      - 4317:4317
      - 4318:4318
      - 16686:16686
      - 16685:16685
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  postgres-a:
    image: postgres:15
    environment:
      POSTGRES_DB: servicea_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_a_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d servicea_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  postgres-b:
    image: postgres:15
    environment:
      POSTGRES_DB: serviceb_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - postgres_b_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d serviceb_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  servicea:
    build:
      context: ./src/ServiceA
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      postgres-a:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres-a;Database=servicea_db;Username=user;Password=password
      - Cache__Redis=redis:6379
      - Kafka__BootstrapServers=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317   # ← ИСПРАВЛЕНО!
      - OTEL_SERVICE_NAME=service-a
      - OTEL_LOG_LEVEL=debug
    networks:
      - app-network

  serviceb:
    build:
      context: ./src/ServiceB
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    depends_on:
      postgres-b:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres-b;Database=serviceb_db;Username=user;Password=password
      - Kafka__BootstrapServers=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317   # ← ИСПРАВЛЕНО!
      - OTEL_SERVICE_NAME=service-b
      - OTEL_LOG_LEVEL=debug
    networks:
      - app-network

volumes:
  postgres_a_data:
  postgres_b_data:

networks:
  app-network:
    driver: bridge
    name: app-network